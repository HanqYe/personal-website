<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qiye Han — Desktop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/"
    }
  }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #d5cfc5; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #2d2a26; -webkit-font-smoothing: antialiased; }

    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.15) 100%);
    }
    #grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 2; opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Loader */
    #loader {
      position: fixed; inset: 0; z-index: 200; background: #d5cfc5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 1s ease;
    }
    #loader.done { opacity: 0; pointer-events: none; }
    #loader h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 600; letter-spacing: -0.03em; color: #3a3530; }
    #loader p { font-size: 0.7rem; color: #8b8680; margin-top: 0.4rem; letter-spacing: 0.06em; text-transform: uppercase; }
    #loader-bar { width: 60px; height: 1px; background: #c0b8a8; margin-top: 2rem; overflow: hidden; }
    #loader-bar::after { content: ''; display: block; width: 40%; height: 100%; background: #7a7268; animation: loadSlide 1s ease-in-out infinite; }
    @keyframes loadSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }

    /* UI Overlay */
    #ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

    #header { position: absolute; top: 2rem; left: 2.5rem; opacity: 0; transition: opacity 0.8s ease; }
    #header.show { opacity: 1; }
    #header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 600; letter-spacing: -0.02em; color: #3a3530; }
    #header p { font-size: 0.6rem; color: #8b8680; margin-top: 0.15rem; letter-spacing: 0.06em; text-transform: uppercase; }

    #nav {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 2rem; opacity: 0; transition: opacity 0.8s ease; pointer-events: auto;
    }
    #nav.show { opacity: 1; }
    #nav a {
      font-size: 0.65rem; color: #8b8680; text-decoration: none;
      text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
      position: relative; transition: color 0.3s ease;
    }
    #nav a::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1px; background: #4d6a6d;
      transition: width 0.3s cubic-bezier(0.33, 1, 0.68, 1);
    }
    #nav a:hover { color: #3a3530; }
    #nav a:hover::after { width: 100%; }
    #nav a:focus-visible { color: #3a3530; outline: 1px solid #4d6a6d; outline-offset: 4px; }

    #hint {
      position: absolute; bottom: 4.5rem; left: 50%; transform: translateX(-50%);
      font-size: 0.6rem; color: #a09888; letter-spacing: 0.06em;
      opacity: 0; transition: opacity 0.8s ease;
    }
    #hint.show { opacity: 1; }

    #view-link {
      position: absolute; top: 2rem; right: 2.5rem;
      font-size: 0.6rem; color: #8b8680; text-decoration: none;
      letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500;
      pointer-events: auto; opacity: 0;
      transition: opacity 0.8s ease, color 0.3s ease;
    }
    #view-link.show { opacity: 1; }
    #view-link:hover { color: #3a3530; }

    .label-3d {
      position: absolute; pointer-events: none; white-space: nowrap;
      font-size: 0.55rem; color: #9a9088; text-transform: uppercase;
      letter-spacing: 0.12em; font-weight: 500;
      opacity: 0; transition: opacity 0.4s ease, color 0.3s ease;
      transform: translate(-50%, 0);
    }
    .label-3d.visible { opacity: 1; }
    .label-3d.hovered { color: #4d6a6d; }

    /* Panel */
    #panel {
      position: fixed; top: 0; right: 0; width: 440px; height: 100vh;
      background: rgba(250, 248, 244, 0.96);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border-left: 1px solid rgba(0,0,0,0.06);
      transform: translateX(100%);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 20; overflow-y: auto; overflow-x: hidden;
      color: #2d2a26;
    }
    #panel.open { transform: translateX(0); pointer-events: auto; }

    #panel-close {
      position: sticky; top: 0; z-index: 1;
      display: flex; justify-content: flex-end;
      padding: 1.5rem 1.5rem 0 0; background: transparent; border: none; cursor: pointer;
    }
    #panel-close span {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: rgba(0,0,0,0.04);
      color: #888; font-size: 1.1rem; line-height: 1;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    #panel-close span:hover { background: rgba(0,0,0,0.08); color: #333; }

    #panel-content { padding: 0 2.5rem 3rem; }

    .pt { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 600; letter-spacing: -0.03em; line-height: 1.2; color: #2d2a26; }
    .ps { font-size: 0.65rem; color: #8b8680; margin-top: 0.4rem; letter-spacing: 0.04em; }
    .pd { width: 28px; height: 1.5px; background: #4d6a6d; opacity: 0.3; margin: 1.5rem 0; }
    .pb { font-size: 0.82rem; line-height: 1.8; color: #555; }
    .pb + .pb { margin-top: 0.8rem; }
    .pc { padding: 0.85rem 1rem; border-left: 2px solid #e0dcd5; margin-bottom: 0.6rem; transition: border-color 0.3s ease; }
    .pc:hover { border-color: #4d6a6d; }
    .pc h4 { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; font-weight: 600; margin-bottom: 0.3rem; color: #2d2a26; }
    .pc p { font-size: 0.72rem; line-height: 1.7; color: #777; }
    .pdl {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.7rem 1rem; background: rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.06); border-radius: 3px;
      color: #555; text-decoration: none; font-size: 0.78rem; margin-bottom: 0.5rem;
      transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .pdl:hover { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); transform: translateY(-1px); }
    .pdl:active { transform: translateY(0); }
    .pdl:focus-visible { outline: 1px solid #4d6a6d; outline-offset: 2px; }
    .pdl svg { flex-shrink: 0; width: 18px; height: 18px; }
    .pdl .meta { font-size: 0.6rem; color: #999; }
    .pgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    .pgrid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 2px; cursor: pointer; transition: transform 0.3s cubic-bezier(0.33,1,0.68,1); }
    .pgrid img:hover { transform: scale(1.03); }
    .p-contact { display: flex; align-items: center; gap: 0.5rem; font-size: 0.72rem; color: #888; margin-top: 1rem; }
    .p-contact a { color: #4d6a6d; text-decoration: none; transition: color 0.2s ease; }
    .p-contact a:hover { color: #3a5557; }
    .p-contact svg { width: 14px; height: 14px; flex-shrink: 0; }
    .p-profile { width: 100%; max-height: 220px; object-fit: cover; object-position: center 70%; border-radius: 3px; margin-bottom: 1.5rem; }

    #lightbox {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(5,5,5,0.92); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; cursor: zoom-out; transition: opacity 0.35s ease;
    }
    #lightbox.active { opacity: 1; pointer-events: auto; }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; transform: scale(0.95); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    #lightbox.active img { transform: scale(1); }

    @media (max-width: 768px) {
      #panel { width: 100vw; }
      #panel-content { padding: 0 1.5rem 3rem; }
      #header { top: 1rem; left: 1.5rem; }
      #view-link { top: 1rem; right: 1.5rem; }
      #nav { gap: 1rem; bottom: 1.5rem; }
      #nav a { font-size: 0.58rem; }
      #hint { bottom: 3.8rem; }
    }
  </style>
</head>
<body>
  <div id="loader"><h1>Qiye Han</h1><p>Economics &middot; RUC &middot; UChicago</p><div id="loader-bar"></div></div>
  <canvas id="canvas"></canvas>
  <div id="vignette"></div>
  <div id="grain"></div>

  <div id="ui">
    <div id="header"><h1>Qiye Han</h1><p>Economics &middot; RUC &middot; UChicago</p></div>
    <a href="index.html" id="view-link">Classic View</a>
    <div id="hint">Click an object to explore</div>
    <div id="nav">
      <a href="#" data-target="monitor">About</a>
      <a href="#" data-target="books">Research</a>
      <a href="#" data-target="folder">Documents</a>
      <a href="#" data-target="frame">Photography</a>
    </div>
  </div>

  <div class="label-3d" id="lbl-monitor">About</div>
  <div class="label-3d" id="lbl-books">Research</div>
  <div class="label-3d" id="lbl-folder">Documents</div>
  <div class="label-3d" id="lbl-frame">Photography</div>

  <div id="panel">
    <button id="panel-close" aria-label="Close"><span>&times;</span></button>
    <div id="panel-content"></div>
  </div>

  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Enlarged photograph">
  </div>

  <script type="module">
    import * as THREE from 'three';

    // ===================== CONFIG =====================
    const DESK_Y = 0.0;
    const CAM_DEFAULT = new THREE.Vector3(0, 2.6, 4.5);
    const LOOK_DEFAULT = new THREE.Vector3(0, 0.5, -0.3);
    const OBJECTS_META = {
      monitor: {
        cam: new THREE.Vector3(0.15, 1.8, 2.4),
        look: new THREE.Vector3(0.15, 1.0, -0.3),
        label: document.getElementById('lbl-monitor'),
        labelOffset: new THREE.Vector3(0, 2.2, 0)
      },
      books: {
        cam: new THREE.Vector3(-1.5, 1.4, 2.3),
        look: new THREE.Vector3(-1.6, 0.3, 0.1),
        label: document.getElementById('lbl-books'),
        labelOffset: new THREE.Vector3(0, 0.9, 0)
      },
      folder: {
        cam: new THREE.Vector3(1.6, 1.2, 2.0),
        look: new THREE.Vector3(1.5, 0.15, 0.0),
        label: document.getElementById('lbl-folder'),
        labelOffset: new THREE.Vector3(0, 0.6, 0)
      },
      frame: {
        cam: new THREE.Vector3(-1.0, 1.8, 1.8),
        look: new THREE.Vector3(-1.1, 1.5, -1.9),
        label: document.getElementById('lbl-frame'),
        labelOffset: new THREE.Vector3(0, 0.8, 0)
      }
    };

    // ===================== SCENE =====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd5cfc5);
    scene.fog = new THREE.FogExp2(0xd5cfc5, 0.04);

    const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
    camera.position.copy(CAM_DEFAULT);
    const currentLookAt = LOOK_DEFAULT.clone();
    camera.lookAt(currentLookAt);

    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.8;
    const clock = new THREE.Clock();

    // ===================== LIGHTS =====================
    // Bright warm ambient
    const ambient = new THREE.AmbientLight(0xfff8ee, 1.2);
    scene.add(ambient);

    // Hemisphere (sky warm, ground cool)
    const hemi = new THREE.HemisphereLight(0xffeedd, 0x8899aa, 0.8);
    scene.add(hemi);

    // Main sunlight from upper-right-back (window light)
    const sun = new THREE.DirectionalLight(0xfff5e0, 3.5);
    sun.position.set(3, 5, -1);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 15;
    sun.shadow.camera.left = -5;
    sun.shadow.camera.right = 5;
    sun.shadow.camera.top = 5;
    sun.shadow.camera.bottom = -2;
    sun.shadow.bias = -0.0002;
    scene.add(sun);

    // Soft fill from left
    const fill = new THREE.DirectionalLight(0xddeeff, 1.0);
    fill.position.set(-3, 3, 2);
    scene.add(fill);

    // Screen glow
    const screenGlow = new THREE.PointLight(0xaabbcc, 1.5, 3, 2);
    screenGlow.position.set(0.15, 1.3, 0.4);
    scene.add(screenGlow);

    // ===================== MATERIALS =====================
    const beigeMat = new THREE.MeshStandardMaterial({ color: 0xe8dcc8, roughness: 0.55, metalness: 0.02 });
    const beigeDarkMat = new THREE.MeshStandardMaterial({ color: 0xd8ccb4, roughness: 0.6, metalness: 0.02 });
    const woodMat = new THREE.MeshStandardMaterial({ color: 0xb89878, roughness: 0.6, metalness: 0.05 });
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xe0d8cc, roughness: 0.9 });
    const floorMat = new THREE.MeshStandardMaterial({ color: 0xc0a888, roughness: 0.7, metalness: 0.05 });

    // ===================== ENVIRONMENT =====================
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.6;
    floor.receiveShadow = true;
    scene.add(floor);

    const wall = new THREE.Mesh(new THREE.PlaneGeometry(14, 6), wallMat);
    wall.position.set(0, 2.2, -2.2);
    wall.receiveShadow = true;
    scene.add(wall);

    // Desk
    const deskGeo = new THREE.BoxGeometry(5, 0.1, 2.8);
    const desk = new THREE.Mesh(deskGeo, woodMat);
    desk.position.set(0, DESK_Y, -0.2);
    desk.castShadow = true;
    desk.receiveShadow = true;
    scene.add(desk);

    // Desk apron
    const apronMat = new THREE.MeshStandardMaterial({ color: 0xa08060, roughness: 0.65, metalness: 0.05 });
    const apron = new THREE.Mesh(new THREE.BoxGeometry(5, 0.12, 0.05), apronMat);
    apron.position.set(0, -0.05, 1.17);
    scene.add(apron);

    // Desk legs
    const legGeo = new THREE.BoxGeometry(0.08, 0.55, 0.08);
    [[-2.3, -0.33, 1.1], [2.3, -0.33, 1.1], [-2.3, -0.33, -1.35], [2.3, -0.33, -1.35]].forEach(p => {
      const leg = new THREE.Mesh(legGeo, woodMat);
      leg.position.set(...p);
      leg.castShadow = true;
      scene.add(leg);
    });

    // ===================== MAC SCREEN CANVAS =====================
    const SCR_W = 512, SCR_H = 384;
    const screenCanvas = document.createElement('canvas');
    screenCanvas.width = SCR_W; screenCanvas.height = SCR_H;
    const sCtx = screenCanvas.getContext('2d');
    const screenTex = new THREE.CanvasTexture(screenCanvas);
    screenTex.minFilter = THREE.LinearFilter;
    let screenMode = 'idle';
    let cursorBlink = true;

    function wrapText(ctx, text, x, y, maxW, lh) {
      const words = text.split(' ');
      let line = '', ly = y;
      for (const w of words) {
        const t = line + w + ' ';
        if (ctx.measureText(t).width > maxW && line) {
          ctx.fillText(line.trim(), x, ly); line = w + ' '; ly += lh;
        } else { line = t; }
      }
      ctx.fillText(line.trim(), x, ly);
      return ly + lh;
    }

    function drawMenuBar() {
      sCtx.fillStyle = '#fff';
      sCtx.fillRect(0, 0, SCR_W, 19);
      sCtx.strokeStyle = '#000';
      sCtx.lineWidth = 1;
      sCtx.beginPath(); sCtx.moveTo(0, 19.5); sCtx.lineTo(SCR_W, 19.5); sCtx.stroke();
      sCtx.fillStyle = '#000';
      sCtx.font = 'bold 12px Helvetica, Arial, sans-serif';
      sCtx.fillText('\u2318', 8, 14);
      sCtx.font = '11px Helvetica, Arial, sans-serif';
      sCtx.fillText('File', 30, 13);
      sCtx.fillText('Edit', 62, 13);
      sCtx.fillText('View', 96, 13);
      sCtx.fillText('Special', 134, 13);
    }

    function drawWin(x, y, w, h, title, fn) {
      // Shadow
      sCtx.fillStyle = 'rgba(0,0,0,0.12)';
      sCtx.fillRect(x + 2, y + 2, w, h);
      // Body
      sCtx.fillStyle = '#fff';
      sCtx.fillRect(x, y, w, h);
      sCtx.strokeStyle = '#000';
      sCtx.lineWidth = 1;
      sCtx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
      // Title bar stripes
      for (let ly = y + 3; ly < y + 17; ly += 2) {
        sCtx.fillStyle = '#000';
        sCtx.fillRect(x + 22, ly, w - 44, 1);
      }
      // Title bg
      sCtx.font = 'bold 10px Helvetica, Arial, sans-serif';
      const tw = sCtx.measureText(title).width + 12;
      sCtx.fillStyle = '#fff';
      sCtx.fillRect(x + w / 2 - tw / 2, y + 1, tw, 17);
      // Title text
      sCtx.fillStyle = '#000';
      sCtx.textAlign = 'center';
      sCtx.fillText(title, x + w / 2, y + 13);
      sCtx.textAlign = 'left';
      // Close box
      sCtx.strokeRect(x + 6, y + 4, 10, 10);
      // Divider
      sCtx.beginPath(); sCtx.moveTo(x, y + 19.5); sCtx.lineTo(x + w, y + 19.5); sCtx.stroke();
      // Content
      sCtx.save();
      sCtx.beginPath(); sCtx.rect(x + 2, y + 21, w - 4, h - 23); sCtx.clip();
      fn(x + 8, y + 30, w - 16, h - 36);
      sCtx.restore();
    }

    function drawDesktopIcons() {
      const icons = [
        { x: 448, y: 50, label: 'Research' },
        { x: 448, y: 120, label: 'Documents' },
        { x: 448, y: 190, label: 'Photos' },
      ];
      icons.forEach(({ x, y, label }) => {
        // Folder icon
        sCtx.fillStyle = '#fff';
        sCtx.fillRect(x - 14, y, 28, 22);
        sCtx.strokeStyle = '#000';
        sCtx.strokeRect(x - 14, y, 28, 22);
        sCtx.fillRect(x - 14, y - 5, 14, 6);
        sCtx.strokeRect(x - 14, y - 5, 14, 6);
        // Label
        sCtx.fillStyle = '#000';
        sCtx.font = '9px Helvetica, Arial, sans-serif';
        sCtx.textAlign = 'center';
        sCtx.fillText(label, x, y + 36);
      });
      sCtx.textAlign = 'left';
    }

    function updateScreen(mode) {
      screenMode = mode;
      // Desktop bg
      sCtx.fillStyle = '#6088a8';
      sCtx.fillRect(0, 0, SCR_W, SCR_H);
      // Subtle pattern
      sCtx.fillStyle = 'rgba(255,255,255,0.03)';
      for (let py = 0; py < SCR_H; py += 2) for (let px = (py % 4 === 0 ? 0 : 1); px < SCR_W; px += 2) sCtx.fillRect(px, py, 1, 1);

      drawMenuBar();

      switch (mode) {
        case 'idle':
          drawWin(20, 35, 380, 220, 'Welcome', (cx, cy, cw) => {
            sCtx.fillStyle = '#000';
            sCtx.font = 'bold 14px Helvetica, Arial, sans-serif';
            sCtx.fillText('Hello, I\'m Qiye Han.', cx, cy + 6);
            sCtx.font = '11px Helvetica, Arial, sans-serif';
            sCtx.fillStyle = '#444';
            sCtx.fillText('Economics @ RUC \u00B7 Exchange @ UChicago', cx, cy + 26);
            sCtx.fillStyle = '#000';
            sCtx.fillRect(cx, cy + 36, 30, 1);
            sCtx.font = '10px Helvetica, Arial, sans-serif';
            wrapText(sCtx, 'My research interests center on how technological innovation shapes investment \u2014 from platform design and investor behavior to NLP-enabled measurement in financial research.', cx, cy + 55, cw - 8, 14);
            sCtx.fillStyle = '#666';
            sCtx.font = '10px Helvetica, Arial, sans-serif';
            sCtx.fillText('Click any object on the desk to explore.', cx, cy + 140);
            if (cursorBlink) { sCtx.fillStyle = '#000'; sCtx.fillRect(cx + 245, cy + 131, 6, 11); }
          });
          drawDesktopIcons();
          break;
        case 'about':
          drawWin(10, 25, 490, 340, 'About \u2014 Qiye Han', (cx, cy, cw) => {
            sCtx.fillStyle = '#000';
            sCtx.font = 'bold 13px Helvetica, Arial, sans-serif';
            sCtx.fillText('Qiye Han', cx, cy + 6);
            sCtx.font = '10px Helvetica, Arial, sans-serif';
            sCtx.fillStyle = '#666';
            sCtx.fillText('Economics \u00B7 Renmin University of China \u00B7 UChicago', cx, cy + 22);
            sCtx.fillStyle = '#000';
            sCtx.fillRect(cx, cy + 30, 30, 1);

          const kw = (r === 4 && k === 4) ? rowW * 4.5 : rowW - gap;

          kCtx.fillStyle = '#bbb0a0';
          kCtx.fillRect(kx, startY + r * (rowH + gap), kw, rowH);

      folder: `<h2 class="pt">Documents</h2><p class="ps">Click to download</p><div class="pd"></div><a href="Qiye_Han_CV (3).pdf" download class="pdl"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg><div><div>Curriculum Vitae</div><div class="meta">PDF</div></div></a><a href="Real_Analysis_Notes.pdf" download class="pdl"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m.75 12l3 3m0 0l3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg><div><div>Real Analysis Notes</div><div class="meta">PDF</div></div></a>`,

    // ===================== LABELS =====================
    const labelVec = new THREE.Vector3();
    function updateLabels() {
      for (const [name, meta] of Object.entries(OBJECTS_META)) {
        const group = objectGroups[name];
        if (!group) continue;
        labelVec.copy(group.position).add(meta.labelOffset);
        labelVec.project(camera);
        const el = meta.label;
        el.style.left = (labelVec.x * 0.5 + 0.5) * innerWidth + 'px';
        el.style.top = (-labelVec.y * 0.5 + 0.5) * innerHeight + 'px';
        el.classList.toggle('visible', !activeObject && labelVec.z < 1);
        el.classList.toggle('hovered', hoveredName === name);
      }
    }

    // ===================== RENDER LOOP =====================
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      mouseSmooth.x += (mouse.x - mouseSmooth.x) * 0.05;
      mouseSmooth.y += (mouse.y - mouseSmooth.y) * 0.05;

      if (!activeObject && !isAnimating) {
        camera.position.x = CAM_DEFAULT.x + mouseSmooth.x * 0.25;
        camera.position.y = CAM_DEFAULT.y + mouseSmooth.y * 0.12;
      }
      camera.lookAt(currentLookAt);

      // Breathing
      for (const [name, group] of Object.entries(objectGroups)) {
        const idx = ['monitor', 'books', 'folder', 'frame'].indexOf(name);
        group.position.y = DESK_Y + 0.05 + Math.sin(t * 0.4 + idx * 1.5) * 0.003;
      }

      // Particles
      const pos = pGeo.attributes.position.array;
      for (let i = 0; i < pCount; i++) {
        pos[i * 3 + 1] += pVel[i];
        if (pos[i * 3 + 1] > 4) { pos[i * 3 + 1] = -0.5; pos[i * 3] = (Math.random() - 0.5) * 7; pos[i * 3 + 2] = (Math.random() - 0.5) * 5; }
      }
      pGeo.attributes.position.needsUpdate = true;

      // Hover
      if (!activeObject) {
        raycaster.setFromCamera(mouseSmooth, camera);
        const hits = raycaster.intersectObjects(interactiveObjects);
        const nh = hits.length > 0 ? hits[0].object.userData.objectName : null;
        if (nh !== hoveredName) {
          if (hoveredName && objectGroups[hoveredName]) gsap.to(objectGroups[hoveredName].scale, { x: 1, y: 1, z: 1, duration: 0.3, ease: 'power2.out' });
          if (nh && objectGroups[nh]) gsap.to(objectGroups[nh].scale, { x: 1.05, y: 1.05, z: 1.05, duration: 0.3, ease: 'power2.out' });
          hoveredName = nh;
          document.body.style.cursor = nh ? 'pointer' : 'default';
        }
      }

      updateLabels();
      renderer.render(scene, camera);
    }

    addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

    setTimeout(() => {
      document.getElementById('loader').classList.add('done');
      setTimeout(() => { ['header', 'view-link', 'hint', 'nav'].forEach(id => document.getElementById(id).classList.add('show')); }, 600);
    }, 1500);

    animate();
  </script>
</body>
</html>
